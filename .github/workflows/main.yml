name: Unzip package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Unzip ZIP into repo
        shell: bash
        run: |
          set -euo pipefail

          echo "Looking for ZIP..."
          ZIP_FILE=$(find . -maxdepth 4 -type f -name '*.zip' | sort | head -n 1 || true)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP file found."
            exit 1
          fi

          echo "Found ZIP: $ZIP_FILE"
          rm -rf extracted
          mkdir -p extracted
          unzip -o "$ZIP_FILE" -d extracted

          echo "Finding extracted package root..."
          PACKAGE_ROOT=$(find extracted -mindepth 1 -maxdepth 2 -type f -name 'package.json' -printf '%h\n' | sort | head -n 1 || true)

          if [ -z "$PACKAGE_ROOT" ]; then
            PACKAGE_ROOT=$(find extracted -mindepth 1 -maxdepth 1 -type d | sort | head -n 1 || true)
          fi

          if [ -z "$PACKAGE_ROOT" ]; then
            echo "ERROR: Could not identify extracted package root."
            find extracted -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "Using package root: $PACKAGE_ROOT"
          echo "Copying extracted contents into repository root..."
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'extracted/' \
            --exclude '*.zip' \
            "$PACKAGE_ROOT"/ ./

          if [ -f public/index.html ]; then
            echo "Copying public/index.html to root index.html"
            cp public/index.html index.html
          fi

          if [ -d public/apps ]; then
            echo "Copying public/apps to root apps"
            rm -rf apps
            cp -R public/apps ./apps
          fi

          if [ -d public/assets ]; then
            echo "Copying public/assets to root assets"
            rm -rf assets
            cp -R public/assets ./assets
          fi

          rm -rf extracted

          echo "Final deployable files:"
          find . -maxdepth 4 -type f | sort

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit. ZIP contents already unpacked."
          else
            git commit -m "Unzip package into deployable site"
            git push
          fi
