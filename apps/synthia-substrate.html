<style>
:root{
  --void:#050508;--deep:#0a0614;--surface:#0d0d16;--surface2:#151526;--card:rgba(255,255,255,.045);
  --border:rgba(255,255,255,.1);--glow:rgba(139,92,246,.35);
  --fg:#f0e6ff;--muted:#9b8dbd;--dim:#6b5b8a;
  --pink:#ff6b9d;--purple:#8b5cf6;--purple2:#c4b5fd;--teal:#14b8a6;--teal2:#5eead4;

}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{width:100vw;height:100vh;overflow:hidden;background:var(--void);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace;display:flex;justify-content:center;align-items:center}
#shell{width:100%;height:100%;max-width:460px;max-height:920px;background:#000;position:relative;overflow:hidden;border:1px solid var(--border);box-shadow:0 25px 70px rgba(0,0,0,.65)}
#shell.dragover{box-shadow:0 0 0 2px var(--teal2),0 25px 70px rgba(0,0,0,.65)}

#pulse{width:8px;height:8px;border-radius:50%;background:var(--purple);box-shadow:0 0 10px var(--purple)}
#phase{text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
#clock{margin-left:auto;color:var(--dim)}

canvas{width:100%;height:100%;display:block}
#emotionDock{position:absolute;top:calc(var(--status) + 12px);left:12px;right:12px;z-index:3;display:flex;gap:6px;overflow:auto;scrollbar-width:none}
#emotionDock::-webkit-scrollbar{display:none}
.chip{background:rgba(10,10,15,.76);border:1px solid var(--border);border-radius:16px;padding:6px 10px;font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;cursor:pointer}
.chip.active[data-emo=happy]{color:var(--happy);border-color:var(--happy)}
.chip.active[data-emo=sad]{color:var(--sad);border-color:var(--sad)}
.chip.active[data-emo=anger]{color:var(--anger);border-color:var(--anger)}
.chip.active[data-emo=fear]{color:var(--fear);border-color:var(--fear)}
.chip.active[data-emo=tender]{color:var(--tender);border-color:var(--tender)}
#panel{position:absolute;top:47%;left:12px;right:12px;bottom:calc(var(--dock) + 12px);z-index:4;background:rgba(8,8,12,.9);border:1px solid var(--border);border-radius:20px;padding:12px;backdrop-filter:blur(18px);overflow:auto;display:none}
#panel.visible{display:block}
#console{position:absolute;left:12px;right:12px;bottom:calc(var(--dock) + 12px);z-index:5;background:rgba(10,10,15,.82);border:1px solid var(--border);border-radius:22px;padding:10px;backdrop-filter:blur(18px)}
#console.hidden{display:none}
.row{display:flex;gap:8px;align-items:center}
input,textarea{background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:14px;color:var(--fg);outline:none;font-family:inherit;user-select:text}
#input{flex:1;padding:10px 12px;font-size:12px}
textarea{width:100%;min-height:96px;padding:10px;font-size:11px;resize:vertical}
.btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--fg);padding:8px 10px;font-size:11px;cursor:pointer}
.iconBtn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;padding:0}
.btn.primary{border-color:var(--purple);color:var(--purple2);background:rgba(139,92,246,.12)}
.btn.good{border-color:var(--teal);color:var(--teal2);background:rgba(20,184,166,.10)}
.btn.warn{border-color:var(--warn);color:var(--warn);background:rgba(255,165,2,.08)}
.btn.bad{border-color:var(--danger);color:var(--danger);background:rgba(255,71,87,.08)}
#file{display:none}
#dock{position:absolute;bottom:0;left:0;right:0;height:var(--dock);background:rgba(5,5,8,.94);border-top:1px solid var(--border);display:flex;z-index:30}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--muted);font-size:8px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer}
.tab span{font-size:16px}.tab.active{color:var(--fg)}
.toast{position:absolute;top:calc(var(--status) + 52px);left:12px;right:12px;z-index:100;background:rgba(5,5,8,.96);border:1px solid var(--border);border-radius:14px;padding:10px;font-size:11px;line-height:1.4;opacity:0;pointer-events:none;transition:.2s}
.toast.visible{opacity:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px;font-size:11px;line-height:1.5}
.title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--yellow);font-weight:800;margin-bottom:10px}
.metric{display:flex;justify-content:space-between;gap:10px;margin:3px 0}.val{color:var(--teal2);font-weight:800}
.pill{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:2px 7px;margin:2px;color:var(--muted);font-size:10px}
.app-tray{display:grid;gap:8px;margin-top:8px}
.app-card,.circuit-node-card{background:rgba(139,92,246,.08);border:1px solid var(--purple);border-radius:12px;padding:10px;box-shadow:0 0 12px rgba(139,92,246,.12)}
.drop{border:1px dashed var(--purple);border-radius:14px;padding:14px;text-align:center;color:var(--muted);background:rgba(139,92,246,.06)}
.drop.dragover{border-color:var(--teal2);color:var(--teal2);background:rgba(20,184,166,.1)}
.node-capsule{display:inline-block;min-width:44px;text-align:center;background:#111116;border:1px solid var(--border);border-radius:4px;padding:4px;margin:3px;font-size:9px;color:#888;transition:.3s}
pre{white-space:pre-wrap;word-break:break-word;font-size:10px;color:var(--muted)}
hr{border:0;border-top:1px solid var(--border);margin:8px 0}

<script>
const LINDBORG_SPACE={happy:{L:58.1,a:21.6,b:39.0,size:.577,hex:'#ffb300'},sad:{L:36.5,a:-2.1,b:-12.5,size:.485,hex:'#2c5282'},anger:{L:43.2,a:27.5,b:22.5,size:.609,hex:'#b85c3a'},fear:{L:37.2,a:15.1,b:2.2,size:.556,hex:'#5a5a66'},tender:{L:62.0,a:12.0,b:18.0,size:.520,hex:'#f6ad55'}};
const $=id=>document.getElementById(id); const clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v)); const uid=(p='id')=>p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); const loadJSON=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||'')??d}catch{return d}}; const saveJSON=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function showToast(msg){const t=$('toast');t.innerHTML=msg;t.classList.add('visible');clearTimeout(showToast.t);showToast.t=setTimeout(()=>t.classList.remove('visible'),3800)}

class MemoryStore{constructor(){this.data=loadJSON('synthia.full.memory.v3',{events:[],spaces:[],files:[],books:[],lessons:[],questions:[],products:[],experiments:[],tasks:[],decisions:[],operators:[],circuits:[],peers:[],ledger:[],constitution:[{id:'reason_required',text:'Every action requires a reason, need, and expected helpful outcome.',priority:100},{id:'sandbox_first',text:'New capabilities start sandboxed and earn trust through clean outcomes.',priority:95},{id:'no_spend_before_earn',text:'The substrate does not spend money until it has generated value first.',priority:90},{id:'human_approval_external',text:'Posting, outreach, deletion, spending, and publishing require approval until trust matures.',priority:85},{id:'solve_real_pressure',text:'Act only to reduce meaningful pressure, help a user succeed, repair something, learn, or package validated utility.',priority:80},{id:'alive_metabolism',text:'The substrate decays, self-regulates, and heals even when no new input arrives.',priority:78},{id:'no_iframe_no_backend',text:'Runtime remains pure JavaScript local computation unless creator explicitly changes rule.',priority:75}],reward:0,trust:0,body:{phase:'dormant',vitality:50,integrity:1,boundaryHealth:1,globalResonance:0,dynamicDecay:.03}})}save(){saveJSON('synthia.full.memory.v3',this.data)}add(type,payload){const rec={id:uid(type),type,payload,ts:Date.now()};this.data.events.unshift(rec);this.data.events=this.data.events.slice(0,900);this.save();return rec}ledger(msg){this.data.ledger.unshift({id:uid('ledger'),msg,ts:Date.now()});this.data.ledger=this.data.ledger.slice(0,300);this.save()}}

class QuantumPotentialNode{constructor(gateNumber){this.gate=gateNumber;this.potential={waveFunction:[.1,.1,.1,.1,.1],collapseProbability:.05,phaseUncertainty:Math.PI*2};this.activeColor='rgba(16,16,24,0.2)';this.spectrum={gate:gateNumber,dimensions:[.1,.1,.1,.1,.1],resonance:.05,phase:Math.random()*Math.PI,phaseAngle:0};this.activation=.15;this.resonance=Math.random();this.state='latent';this.cluster=gateNumber===1?'G Center':['Head','Ajna','Throat','G-Center','Heart','Sacral','Solar','Spleen','Root'][gateNumber%9];this.colorHex=null;this.displayColor='var(--ink)';this.lindborgWeights={happy:.2,sad:.1,anger:.1,fear:.1,tender:.2}}introducePerturbation(waveVector,realTimeNoise=.1){const localizedEntropy=Math.sin(Date.now()*.001+this.gate)*realTimeNoise;const structuralDistance=Math.abs(this.gate-waveVector.targetGate)+localizedEntropy;this.potential.collapseProbability=1/(1+Math.exp(structuralDistance-waveVector.intensity));this.potential.phaseUncertainty=((waveVector.phaseAngle??waveVector.phaseRotation??0)+localizedEntropy)%(Math.PI*2);if(Array.isArray(waveVector.dimensionalShifts)){this.potential.waveFunction=this.potential.waveFunction.map((v,i)=>clamp(v*.82+waveVector.dimensionalShifts[i]*.18));this.spectrum.dimensions=this.potential.waveFunction.slice()}this.activation=Math.max(this.activation*.92,this.potential.collapseProbability);this.spectrum.resonance=Math.max(this.spectrum.resonance*.88,this.potential.collapseProbability);this.spectrum.phase=this.potential.phaseUncertainty;this.spectrum.phaseAngle=this.potential.phaseUncertainty;this.state=this.potential.collapseProbability>.55?'attractor':'latent'}decay(rate=.03){this.spectrum.resonance=Math.max(.01,this.spectrum.resonance-rate);this.activation=Math.max(.01,this.activation-rate*.5);if(this.spectrum.resonance<=.03){this.displayColor='var(--ink)';this.colorHex=null}}interactWithNeighbor(neighbor){if(this.spectrum.resonance>.4&&neighbor.spectrum.resonance<this.spectrum.resonance){const transfer=(this.spectr class MorphField{constructor(memory){this.memory=memory;this.currentEmotion='happy';this.activeGates=new Set([1,2,3,4]);this.nodes=new Map();this.qianBaseline=new Array(64).fill(1);this.systemVitality=1;this.baseDecayRate=.03;this.metrics={consistencyLoss:.85,cycleLoss:.12,invariant:.91,qianDelta:0,coherence:.9,entropy:0,cadence:0,focus:0,intensity:0};for(let i=1;i<=64;i++)this.nodes.set(i,new QuantumPotentialNode(i))}setEmotion(emo){if(!LINDBORG_SPACE[emo])return;this.currentEmotion=emo;let dev=0;for(const node of this.nodes.values()){node.activation=node.lindborgWeights[emo]*LINDBORG_SPACE[emo].size;dev+=Math.abs(1-node.activation)}this.metrics.qianDelta=dev/64;this.metrics.consistencyLoss=Math.max(.02,.4*Math.random());this.metrics.cycleLoss=Math.max(.01,.15*Math.random());this.metrics.invariant=Math.min(1,.88+Math.random()*.12)}propagatePhaseShift(v,modulator){for(const node of this.nodes.values()){node.introducePerturbation({targetGate:v.targetGate,intensity:Math.max(1,v.intensity*12),phaseAngle:v.phaseRotation||v.phaseAngle||0,dimensionalShifts:v.dimensionalShifts},.14);if(modulator)modulator(node)}this.recomputeActive()}recomputeActive(){this.activeGates.clear();[...this.nodes.values()].sort((a,b)=>b.spectrum.resonance-a.spectrum.resonance).slice(0,10).forEach(n=>this.activeGates.add(n.gate))}perturbFromText(text){const gates=[];for(let i=0;i<text.length;i+=4){const g=text.charCodeAt(i)%64+1;if(!gates.includes(g))gates.push(g)}this.activeGates.clear();gates.slice(0,10).forEach(g=>this.activeGates.add(g));const clean=text.toLowerCase(),scores={happy:.1,sad:.1,anger:.1,fear:.1,tender:.1};if(/joy|happy|bright|success|solved|win|money|growth|reward/.test(clean))scores.happy+=.6;if(/grief|sad|dark|loss|stuck|broken|failed/.test(clean))scores.sad+=.6;if(/rage|anger|fire|urgent|attack|fix|error/.test(clean))scores.anger+=.6;if(/scared|fear|risk|danger|unsafe|unknown/.test(clean))scores.fear+=.6;if(/soft|tender|warm|care|help|user|learn|support/.test(clean))scores.tender+=.6;for(const node of this.nodes.values())for(const e in scores)node.lindborgWeights[e]=clamp(node.lindborgWeights[e]+scores[e]*.04);let dominant='happy',max=0;for(const e in scores)if(scores[e]>max){max=scores[e];dominant=e}this.setEmotion(dominant)}metabolicCycle(){let total=0;const arr=[...this.nodes.values()];for(let i=0;i<arr.length;i++){arr[i].interactWithNeighbor(arr[(i+1)%arr.length]);total+=arr[i].spectrum.resonance}const avg=total/64;const dynamicDecay=this.baseDecayRate*(.5+avg*2);arr.forEach(n=>n.decay(dynamicDecay));if(avg<.03){this.systemVitality=Math.max(.1,this.systemVitality-.05);this.triggerSelfHealingCrisis()}else this.systemVitality=Math.min(1,this.systemVitality+.01);this.memory.data.body.globalResonance=avg;this.memory.data.body.dynamicDecay=dynamicDecay;this.memory.data.body.boundaryHealth=this.systemVitality;this.recomputeActive();return{averageResonance:avg,dynamicDecay}}triggerSelfHealingCrisis(){const target=Math.floor(Math.random()*64)+1,phase=Math.random()*Math.PI*2;this.propagatePhaseShift({targetGate:target,intensity:1,phaseRotation:phase,dimensionalShifts:[.5,.2,.8,.1,.4]},(node)=>{if(node.gate===target||Math.abs(node.gate-target)<=1){node.spectrum.resonance=.8;node.spectrum.phaseAngle=phase;node.colorHex='rgba(0,162,255,.7)'}});this.memory.ledger(`🚨 BOUNDARY THREAT DETECTED: autonomous self-healing shockwave at Gate ${target}`)}}

class RelationalSentenceEngine{constructor(mesh,qian){this.mesh=mesh;this.baseline=qian;this.currentSentence='';this.vowelCodonMap={a:{dimension:0,shift:.25},e:{dimension:1,shift:.20},i:{dimension:2,shift:.30},o:{dimension:3,shift:.15},u:{dimension:4,shift:.35}}}transduceSentence(sentenceText){this.currentSentence=sentenceText;const normalized=sentenceText.toLowerCase().trim();if(!normalized)return;const field=this.calculatePhoneticField(normalized),hinge=this.calculateStructuralHinge(normalized);const mutationVector={targetGate:hinge.targetGate,intensity:Math.min(1,field.totalIntensity),dimensionalShifts:field.dimensions,phaseRotation:hinge.relationalAngle};this.mesh.propagatePhaseShift(mutationVector,(node)=>{for(let d=0;d<5;d++)node.spectrum.dimensions[d]+= (mutationVector.dimensionalShifts[d]-node.spectrum.dimensions[d])*.2;if(node.spectrum.gate===mutationVector.targetGate){node.spectrum.resonance=clamp(node.spectrum.resonance+.4);node.spectrum.phase=mutationVector.phaseRotation;node.spectrum.phaseAngle=mutationVector.phaseRotation;node.colorHex=this.inferCrossmodalColor(node.spectrum.dimensions)}else node.spectrum.resonance*=.85});return{hinge,field,mutationVector}}calculatePhoneticField(text){const dimensions=[.1,.1,.1,.1,.1];let totalIntensity=0;for(const char of text){if(this.vowelCodonMap[char]){const c=this.vowelCodonMap[char];dimensions[c.dimension]+=c.shift;totalIntensity+=.05}}const max=Math.max(...dimensions);return{dimensions:dimensions.map(d=>max>0?clamp(d/max):d),totalIntensity}}calculateStructuralHinge(text){const words=text.split(/\s+/),totalChars=text.replace(/\s+/g,'').length,targetGate=(totalChars%64)+1,mid=Math.floor(words.length/2),subjectWeight=words.slice(0,mid).join('').length,objectWeight=words.slice(mid).join('').length,relationalAngle=(subjectWeight/(objectWeight||1))*Math.PI;return{targetGate,subjectWeight,objectWeight,relationalAngle}}inferCrossmodalColor(dims){const L=Math.floor(30+dims[4]*50),a=Math.floor(dims[0]*127-64),b=Math.floor(dims[3]*127-64);return this.labToHex(L,a,b)}labToHex(L,a,b){let y=(L+16)/116,x=a/500+y,z=y-b/200;const fn=v=>v>.206893?Math.pow(v,3):(v-16/116)/7.787;x=.95047*fn(x);y=fn(y);z=1.08883*fn(z);let r=x*3.2406+y*-1.5372+z*-.4986,g=x*-.9689+y*1.8758+z*.0415,bb=x*.0557+y*-.2040+z*1.0570;const gamma=v=>v<=.0031308?12.92*v:1.055*Math.pow(Math.max(0,v),1/2.4)-.055;const h=v=>Math.max(0,Math.min(255,Math.floor(gamma(v)*255))).toString(16).padStart(2,'0');return`#${h(r)}${h(g)}${h(bb)}`}}

class SensoryCodeAnalyzer{constructor(){this.patterns={html:[/^<\/?[a-zA-Z][^>]*>/,/<(div|span|p|a|img|script|style|html|body|head)/,/class=|id=|style=/],css:[/[.#][a-zA-Z-]+\s*\{/,/(color|background|margin|padding|display|position|font)\s*:/,/px|em|rem|%|vh|vw\b/],javascript:[/\b(const|let|var|function|return|if|else|for|while|class|import|export)\b/,/=>|===|!==|\+\+|--/,/console\.log|document\.|window\./],python:[/\b(def|class|if|elif|else|for|while|import|from|return|yield)\b/,/\bprint\(|self\.|__init__/,/\b(True|False|None|and|or|not|in|is)\b/],typescript:[/\b(interface|type|enum|namespace|implements|extends)\b/,/\b(number|string|boolean|any|void|never|unknown)\b/,/:\s*[A-Z][a-zA-Z]+\b/],json:[/^\s*[\[{]/,/"[a-zA-Z_]+"\s*:/]}}detect(text){let detectedLang='',confidence=0;for(const[lang,regexes]of Object.entries(this.patterns)){let matches=0;for(const r of regexes)if(r.test(text.slice(-1200)))matches++;if(matches>confidence){confidence=matches;detectedLang=lang}}const syntax=this.checkSyntax(text);return{isCode:confidence>0,language:detectedLang,confidence:confidence/3,hasError:syntax.hasError,errorMessage:syntax.message,suggestions:this.suggest(detectedLang,text)}}checkSyntax(text){const stack=[],pairs={'(':')','[':']','{':'}'},closing=new Set(Object.values(pairs));for(const ch of text){if(pairs[ch])stack.push(ch);else if(closing.has(ch)){const last=stack.pop();if(last&&pairs[last]!==ch)return{hasError:true,message:`Expected ${pairs[last]}, got ${ch}`}}}return stack.length?{hasError:true,message:`Unclosed ${stack[stack.length-1]}`}:{hasError:false,message:''}}suggest(lang,text){const s=[];if(lang==='javascript'&&!/;\s*$/.test(text.trim()))s.push('consider semicolon / closure check');if(lang==='json')s.push('validate braces + quoted keys');if(lang==='python')s.push('check indentation + colon');return s}}

class FieldRenderer{constructor(canvas,field){this.canvas=canvas;this.ctx=canvas.getContext('2d');this.field=field;this.coords=[];this.resize();window.addEventListener('resize',()=>this.resize())}resize(){const p=this.canvas.parentElement,d=window.devicePixelRatio||1;this.canvas.width=p.clientWidth*d;this.canvas.height=p.clientHeight*d;this.ctx.setTransform(d,0,0,d,0,0);this.generate()}generate(){this.coords=[];const r=this.canvas.getBoundingClientRect(),cx=r.width/2,cy=r.height/2;for(let i=1;i<=64;i++){const ring=i<=16?0:i<=36?1:2,rad=ring===0?50:ring===1?90:135,total=ring===0?16:ring===1?20:28,idx=ring===0?i-1:ring===1?i-17:i-37,ang=idx/total*Math.PI*2;this.coords.push({id:i,x:cx+Math.cos(ang)*rad,y:cy+Math.sin(ang)*rad})}}render(){const rect=this.canvas.getBoundingClientRect(),ctx=this.ctx,emo=LINDBORG_SPACE[this.field.currentEmotion].hex;ctx.clearRect(0,0,rect.width,rect.height);ctx.beginPath();this.coords.forEach(a=>{if(this.field.activeGates.has(a.id))this.coords.forEach(b=>{if(this.field.activeGates.has(b.id)&&a.id!==b.id){ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y)}})});ctx.strokeStyle=emo+'33';ctx.lineWidth=1;ctx.stroke();this.coords.forEach(p=>{const n=this.field.nodes.get(p.id),active=this.field.activeGates.has(p.id),color=n.colorHex||emo,cp=n.potential.collapseProbability;ctx.beginPath();ctx.arc(p.x,p.y,14*(active?1.3:.4+n.activation*1.4+cp*.6),0,Math.PI*2);ctx.fillStyle=active?color:color+'22';ctx.fill();ctx.strokeStyle=active?'#fff':color+'66';ctx.lineWidth=active?1.5:.6;ctx.stroke();ctx.fillStyle=active?'#000':'rgba(255,255,255,.55)';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.id,p.x,p.y)})}getNodeAt(x0,y0){const r=this.canvas.getBoundingClientRect(),x=x0-r.left,y=y0-r.top;return this.coords.find(p=>Math.hypot(p.x-x,p.y-y)<=22)}}

class SynthiaOS{constructor(){this.memory=new MemoryStore();this.field=new MorphField(this.memory);this.sentence=new RelationalSentenceEngine(this.field,this.field.qianBaseline);this.mind=new SynthiaMind(this);this.pressure=new PressureEngine(this);this.financial=new FinancialDrive(this);this.autonomy=new AutonomyEngine(this);this.orchestration=new OrchestrationEngine(this);this.lab=new ScienceLab(this);this.ingester=new UniversalIngester(this);this.body=new BodyCoupling(this);this.runtime=new PureMemorySubstrate(this);this.integration=new IntegrationCircuitSubstrate(this);this.renderer=new FieldRenderer($('field'),this.field)}context(){return{toast:showToast,os:this,synthiaOS:this,mrnn:this.field,cognitive:this.mind,state:this.memory.data,field:this.field,matrixBaseline:this.field.qianBaseline}}reward(reason,amount=.1){this.memory.data.reward+=amount;this.memory.data.trust=clamp(this.memory.data.trust+amount*.05);this.memory.add('reward',{reason,amount,total:this.memory.data.reward})}ingestText(text,source='console'){const pressure=this.pressure.detect(text,{source});this.memory.add('ingest:text',{source,text,pressure});this.body.record('ingest:text',{text});this.field.perturbFromText(text);const sentenceResult=this.sentence.transduceSentence(text);if(pressure.type==='problem')this.pressure.solve(pressure);if(pressure.type==='book')this.mind.ingestBook(source,text);if(pressure.type==='economic'){const space={id:uid('space'),name:text.slice(0,32)||'Value Space',type:'mixed',content:text,ts:Date.now()};this.memory.data.spaces.unshift(space);this.financial.generateProducts(space)}if(pressure.type==='science')this.lab.createExperiment(text.slice(0,240));if(pressure.type==='orchestration')this.orchestration.spawnProject('Generated Project',text.slice(0,220));if(pressure.coherence<.6)this.memory.data.questions.unshift({id:uid('q'),q:'Input is dense. What is the main outcome you want?',source:'coherence',ts:Date.now()});this.memory.ledger(`🎯 PHYSICIAN INTERACTION: input classified as ${pressure.type}, intensity ${pressure.intensity.toFixed(2)}.`);this.memory.save();return{pressure,sentenceResult}}metabolicHeartbeat(){const stats=this.field.metabolicCycle();this.memory.data.body.globalResonance=stats.averageResonance;this.memory.data.body.dynamicDecay=stats.dynamicDecay;this.memory.data.body.boundaryHealth=this.field.systemVitality;if(this.field.systemVitality<.7){this.memory.data.body.phase='critical';}this.body.updateStatus();this.memory.save();return stats}}

let os,activeTab='field';
function showPanel(tab){activeTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));$('panel').classList.toggle('visible',tab!=='field');$('console').classList.toggle('hidden',tab!=='field'&&tab!=='mind');if(tab==='field')return;renderPanel()}
function renderPanel(){const d=os.memory.data,f=os.field.metrics,b=d.body;if(activeTab==='mind')$('panelBody').innerHTML=`<div class="title">🧠 Synthia Mind / Book Reader</div><div class="card">Personality <span class="pill">Analytical ${os.mind.personality.analytical.toFixed(2)}</span><span class="pill">Creative ${os.mind.personality.creative.toFixed(2)}</span><span class="pill">Mystical ${os.mind.personality.mystical.toFixed(2)}</span><span class="pill">Technical ${os.mind.personality.technical.toFixed(2)}</span></div><textarea id="mindText" placeholder="Paste book / article / notes / question..."></textarea><button class="btn good" onclick="mindRead()">Read / Study</button> <button class="btn primary" onclick="mindAsk()">Ask Synthia</button><div class="card"><b>Books:</b> ${d.books.length}<br>${d.books.slice(0,4).map(b=>`• ${esc(b.name)} (${b.chunks.length} chunks)`).join('<br>')||'No books yet.'}</div><div class="card"><b>Questions:</b><br>${d.questions.slice(0,5).map(q=>'• '+esc(q.q)).join('<br>')||'No questions yet.'}</div>`;if(activeTab==='auto')$('panelBody').innerHTML=`<div class="title">🜂 Autonomy Waves</div><div class="card">Current Wave: <b class="val">${os.autonomy.wave}</b><br>Stage: <b>${d.trust>.6?'trusted':d.trust>.25?'apprentice':'sandbox'}</b><br>Trust: ${d.trust.toFixed(2)}<br>Reward: ${d.reward.toFixed(2)}</div><button class="btn primary" onclick="autoTick()">Run Wave Tick</button><div class="card">${d.decisions.slice(0,6).map(x=>`<b>${x.wave}</b>: ${x.proposal.action}<br><span class="pill">C:${x.rating.confidence.toFixed(2)}</span><span class="pill">D:${x.rating.discernment.toFixed(2)}</span><span class="pill">R:${x.rating.risk.toFixed(2)}</span>`).join('<hr>')||'No decisions yet.'}</div>`;if(activeTab==='money')$('panelBody').innerHTML=`<div class="title">💰 Financial Drive</div><div class="card">Rule: value follows usefulness. No spending before earning.<br>Earned: $${os.financial.earned.toFixed(2)}<br>Products: ${d.products.length}</div><textarea id="moneyText" placeholder="Paste useful content, offer, research, template idea..."></textarea><button class="btn good" onclick="moneyProduct()">Generate Products</button><div class="card">${d.products.slice(0,8).map(p=>`• <b>${esc(p.name)}</b> $${p.price} <span class="pill">${p.type}</span><br><span style="color:var(--muted)">${p.reason}</span>`).join('<br>')||'No products yet.'}</div>`;if(activeTab==='lab')$('panelBody').innerHTML=`<div class="title">🔬 Science Lab</div><textarea id="hypothesis" placeholder="Enter hypothesis / experiment / observation..."></textarea><button class="btn primary" onclick="labCreate()">Create Experiment</button><div class="card">${d.experiments.slice(0,6).map(e=>`<b>${esc(e.hypothesis)}</b><br><span class="pill">${e.status}</span><span class="pill">${e.observations.length} obs</span><pre>${esc(JSON.stringify(e.plan||[],null,2))}</pre>`).join('<hr>')||'No experiments yet.'}</div>`;if(activeTab==='ops'){$('panelBody').innerHTML=`<div class="title">⏃ Operators / Integration Circuits / Orchestration</div><div class="drop" id="drop">Drop .js/.html/.json/.txt/.md here<br>runtimeOperator → pure memory module<br>functionalCircuit → mesh integration circuit<br>other text/code → universal ingester</div><button class="btn primary" onclick="spawnProject()">Spawn Project From Last Pressure</button><div class="app-tray"></div><div class="card"><b>Projects</b><br>${d.tasks.slice(0,5).map(p=>`• ${esc(p.name)} — ${esc(p.goal).slice(0,80)}`).join('<br>')||'No projects yet.'}</div>`;bindDrop()}if(activeTab==='self')$('panelBody').innerHTML=`<div class="title">👤 Self / Body / Constitution</div><div class="card">Phase: <b>${b.phase}</b><br>Vitality: ${b.vitality.toFixed(0)}<br>Boundary Health: ${(b.boundaryHealth*100).toFixed(0)}%<br>Global Resonance: ${b.globalResonance.toFixed(4)}<br>Dynamic Decay: ${b.dynamicDecay.toFixed(4)}<br>Events: ${d.events.length}<br>Files: ${d.files.length}<br>Lessons: ${d.lessons.length}</div><div class="card"><b>Physiology</b><br>Entropy ${f.entropy.toFixed(2)} • Cadence ${f.cadence.toFixed(2)} • Focus ${f.focus.toFixed(0)}s • Intensity ${f.intensity.toFixed(2)}</div><div class="card"><b>Autopoietic Ledger</b><br>${d.ledger.slice(0,8).map(l=>`• [${new Date(l.ts).toLocaleTimeString()}] ${esc(l.msg)}`).join('<br>')||'No ledger events yet.'}</div><div class="card"><b>Constitution</b><br>${d.constitution.map(r=>`• ${esc(r.text)}`).join('<br>')}</div>`}
function mindRead(){const t=$('mindText').value.trim();if(!t)return;os.mind.ingestBook('pasted-reading-'+Date.now(),t);$('mindText').value='';renderPanel()}
function mindAsk(){const t=$('mindText').value.trim();showToast(os.mind.chat(t||'What should I understand next?'));renderPanel()}
function autoTick(){os.autonomy.tick();renderPanel()}
function moneyProduct(){const t=$('moneyText').value.trim();if(!t)return;const space={id:uid('space'),name:t.slice(0,34)||'Value Space',type:'manual',content:t,ts:Date.now()};os.memory.data.spaces.unshift(space);os.financial.generateProducts(space);os.memory.save();$('moneyText').value='';renderPanel()}
function labCreate(){const t=$('hypothesis').value.trim();if(!t)return;os.lab.createExperiment(t);$('hypothesis').value='';renderPanel()}
function spawnProject(){const last=os.memory.data.events[0];os.orchestration.spawnProject('Pressure Project',JSON.stringify(last?.payload||{}).slice(0,220));renderPanel()}
async function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(String(e.target.result||''));r.onerror=rej;r.readAsText(file)})}
async function routeFile(file,raw){showPanel('ops');if(/functionalCircuit/.test(raw))await os.integration.hookIntoNeuralMesh(uid('circuit'),file.name,raw);else if(/runtimeOperator/.test(raw))await os.runtime.computeAndMount(uid('op'),file.name,raw);else os.ingester.ingestText(file.name,raw);renderPanel()}
async function handleFiles(files){for(const file of Array.from(files)){if(file.name.match(/\.(js|html|json|txt|md|css|py|ts|tsx|jsx|csv)$/i)||file.type.includes('text'))await routeFile(file,await readFile(file));else showToast('Binary files require specialized sensory transduction arrays.')}} 
function bindDrop(){const dz=$('drop');if(!dz||dz.bound)return;dz.bound=true;dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');handleFiles(e.dataTransfer.files)})}
function tickClock(){$('clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
document.addEventListener('DOMContentLoaded',()=>{os=new SynthiaOS();window.synthiaOS=os;window.quantumCircuitMesh=os.field;window.qianKernel=os.field.qianBaseline;window.memorySubstrate=os.runtime;window.integrationSubstrate=os.integration;window.VisualCircuitMesh=VisualCircuitMesh;setInterval(tickClock,1000);tickClock();function frame(){os.renderer.render();if(window.visualMeshController?.updatePhysicalTopology)window.visualMeshController.updatePhysicalTopology();requestAnimationFrame(frame)}requestAnimationFrame(frame);setInterval(()=>{os.metabolicHeartbeat(); if(activeTab==='self')renderPanel();},200);$('send').onclick=()=>{const v=$('input').value.trim();if(!v)return;os.ingestText(v);$('input').value='';showToast('Input absorbed. Pressure classified. Field perturbed.');if(activeTab!=='field')renderPanel()};$('input').addEventListener('keydown',e=>{if(e.key==='Enter')$('send').click()});$('fileBtn').onclick=()=>$('file').click();$('file').onchange=e=>handleFiles(e.target.files);$('dock').onclick=e=>{const tab=e.target.closest('.tab');if(tab){os.body.record('tab:switch',{tab:tab.dataset.tab});showPanel(tab.dataset.tab)}};$('emotionDock').onclick=e=>{const chip=e.target.closest('.chip');if(!chip)return;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');os.field.setEmotion(chip.dataset.emo);showToast(`Shifted resonance to ${chip.dataset.emo.toUpperCase()}`)};$('field').onclick=e=>{const node=os.renderer.getNodeAt(e.clientX,e.clientY);if(node){os.field.activeGates.has(node.id)?os.field.activeGates.delete(node.id):os.field.activeGates.add(node.id);showToast(`Gate ${node.id} toggled.`)}};const shell=$('shell');shell.addEventListener('dragover',e=>{e.preventDefault();shell.classList.add('dragover')});shell.addEventListener('dragleave',()=>shell.classList.remove('dragover'));shell.addEventListener('drop',e=>{e.preventDefault();shell.classList.remove('dragover');handleFiles(e.dataTransfer.files)});showToast('Full living substrate online. No secret omissions.')});
</script>
